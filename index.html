<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB + VWAP Equity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e0f2fe; }
        .card { background: #1a2338; border: 1px solid #334155; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-emerald-400 mb-6">🚀 ORB + VWAP Equity (Long Only)</h1>

        <div class="card p-6 rounded-2xl mb-6">
            <h2 class="text-lg font-semibold mb-4">🔑 Dhan Credentials</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="clientId" value="1108455416" class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                <input id="accessToken" type="password" class="bg-slate-900 p-3 rounded-lg border border-slate-700" placeholder="Today's Token">
            </div>
            <button onclick="connectDhan()" class="mt-4 bg-emerald-600 px-8 py-3 rounded-xl">Save & Connect</button>
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="startBot()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-2xl font-semibold">▶️ START BOT</button>
            <button onclick="emergencyExit()" class="bg-red-600 hover:bg-red-500 px-10 py-4 rounded-2xl font-semibold">⚠️ EMERGENCY EXIT</button>
        </div>

        <div id="logContainer" class="card p-6 rounded-2xl h-96 overflow-y-auto font-mono text-sm"></div>
    </div>

    <script>
        async function connectDhan() {
            const cid = document.getElementById('clientId').value;
            const tok = document.getElementById('accessToken').value;
            const res = await fetch('/eqorb/api/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({client_id: cid, access_token: tok})
            });
            const data = await res.json();
            alert(data.message);
        }

        async function startBot() {
            const res = await fetch('/eqorb/api/start', {method: 'POST'});
            const data = await res.json();
            alert(data.message);
        }

        async function emergencyExit() {
            if (confirm("Close all positions?")) {
                await fetch('/eqorb/api/emergency_exit', {method: 'POST'});
            }
        }

        async function pollLog() {
            try {
                const res = await fetch('/eqorb/api/status');
                const data = await res.json();
                const logDiv = document.getElementById('logContainer');
                logDiv.innerHTML = data.log.map(l => `<div>${l}</div>`).join('');
            } catch(e) {}
        }
        setInterval(pollLog, 3000);
        pollLog();
    </script>
</body>
</html>
