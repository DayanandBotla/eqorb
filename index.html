<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB + VWAP Equity Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0f1c; color: #e0f2fe; }
        .card { background: #1a2338; border: 1px solid #334155; }
        .log { font-family: monospace; font-size: 13px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-emerald-400 mb-6">🚀 ORB + VWAP Equity (Long Only)</h1>

        <!-- Credentials -->
        <div class="card p-6 rounded-2xl mb-6">
            <h2 class="text-lg font-semibold mb-4">🔑 Dhan Credentials</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="clientId" value="1108455416" class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                <input id="accessToken" type="password" class="bg-slate-900 p-3 rounded-lg border border-slate-700" placeholder="Today's Access Token">
            </div>
            <button onclick="connectDhan()" class="mt-4 bg-emerald-600 hover:bg-emerald-500 px-8 py-3 rounded-xl w-full">Save & Connect</button>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap gap-4 mb-8">
            <button onclick="startBot()" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-2xl font-semibold flex-1">▶️ START BOT</button>
            <button onclick="stopBot()" class="bg-orange-600 hover:bg-orange-500 px-10 py-4 rounded-2xl font-semibold flex-1">⏹️ STOP BOT</button>
            <button onclick="emergencyExit()" class="bg-red-600 hover:bg-red-500 px-10 py-4 rounded-2xl font-semibold flex-1">⚠️ EMERGENCY EXIT</button>
        </div>

        <!-- Paper/Real Toggle -->
        <div class="card p-6 rounded-2xl mb-6">
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" id="paperToggle" checked onchange="togglePaperMode()" class="w-5 h-5">
                <span class="text-lg">Paper Mode (Safe Testing)</span>
            </label>
        </div>

        <!-- Status -->
        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="card p-5 rounded-2xl">
                <div class="text-slate-400 text-sm">Bot Status</div>
                <div id="botStatus" class="text-2xl font-bold text-amber-400">STOPPED</div>
            </div>
            <div class="card p-5 rounded-2xl">
                <div class="text-slate-400 text-sm">Active Trades</div>
                <div id="activeTrades" class="text-2xl font-bold">0 / 3</div>
            </div>
            <div class="card p-5 rounded-2xl">
                <div class="text-slate-400 text-sm">Mode</div>
                <div id="modeStatus" class="text-2xl font-bold text-emerald-400">PAPER</div>
            </div>
        </div>

        <!-- Log -->
        <div class="card p-6 rounded-2xl">
            <h3 class="font-semibold mb-3">📋 Activity Log</h3>
            <div id="logContainer" class="log bg-slate-950 p-4 rounded-xl h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        async function connectDhan() {
            const cid = document.getElementById('clientId').value.trim();
            const tok = document.getElementById('accessToken').value.trim();
            if (!cid || !tok) return alert("Please enter Client ID and Token");

            const res = await fetch('/eqorb/api/connect', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({client_id: cid, access_token: tok})
            });
            const data = await res.json();
            alert(data.message || "Connected");
        }

        async function startBot() {
            const res = await fetch('/eqorb/api/start', {method: 'POST'});
            const data = await res.json();
            alert(data.message);
        }

        async function stopBot() {
            await fetch('/eqorb/api/stop', {method: 'POST'});
        }

        async function togglePaperMode() {
            const isPaper = document.getElementById('paperToggle').checked;
            await fetch('/eqorb/api/toggle_paper', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({paper_mode: isPaper})
            });
            document.getElementById('modeStatus').textContent = isPaper ? "PAPER" : "REAL";
            document.getElementById('modeStatus').className = isPaper 
                ? "text-2xl font-bold text-emerald-400" 
                : "text-2xl font-bold text-red-400";
        }

        async function emergencyExit() {
            if (confirm("Close all positions?")) {
                await fetch('/eqorb/api/emergency_exit', {method: 'POST'});
            }
        }

        async function pollStatus() {
            try {
                const res = await fetch('/eqorb/api/status');
                const data = await res.json();
                document.getElementById('botStatus').textContent = data.bot_running ? "RUNNING" : "STOPPED";
                document.getElementById('botStatus').className = data.bot_running 
                    ? "text-2xl font-bold text-emerald-400" 
                    : "text-2xl font-bold text-amber-400";
                document.getElementById('activeTrades').textContent = `${data.active_trades || 0} / 3`;
                document.getElementById('modeStatus').textContent = data.paper_mode ? "PAPER" : "REAL";

                const logDiv = document.getElementById('logContainer');
                logDiv.innerHTML = data.log.map(l => `<div>${l}</div>`).join('');
                logDiv.scrollTop = logDiv.scrollHeight;
            } catch(e) {}
        }

        setInterval(pollStatus, 3000);
        pollStatus();
    </script>
</body>
</html>
